<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>AgentBench — Sign in</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body class="auth-body">
  <canvas id="bgCanvas" class="bg-canvas"></canvas>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand big"><span class="brand-mark">◈</span> AgentBench</div>
      <p class="auth-sub">Build &amp; run agents for any business.</p>

      <div class="role-select">
        <button class="role-opt active" data-as="admin">Main Admin</button>
        <button class="role-opt" data-as="owner">Business Owner</button>
        <button class="role-opt" data-as="staff">Staff</button>
      </div>

      <label class="field"><span>Email</span><input type="email" id="email" placeholder="you@business.com" value="admin@agentbench.app" /></label>
      <label class="field"><span>Password</span><input type="password" id="password" placeholder="••••••••" value="demo" /></label>

      <button class="btn btn-primary full lively" id="loginBtn">Sign in</button>
      <p class="hint muted">Demo: any password works. Role buttons route you to the right dashboard.</p>
    </div>
  </div>
  <script src="js/bg.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
